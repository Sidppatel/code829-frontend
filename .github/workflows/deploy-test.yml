name: Deploy Test Environment to Cloudflare Pages

on:
  push:
    branches: [test/ui-prod-api]

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
      - run: npm ci
      - run: npm run build
        env:
          VITE_API_URL: ${{ secrets.VITE_API_URL }}
          VITE_APP_NAME: Code829-Test
          VITE_DEFAULT_THEME: system

      # --- ADD THIS STEP BELOW ---
      - name: Copy Cloudflare Redirects
        run: cp _redirects dist/ 

      - uses: cloudflare/wrangler-action@v3
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          accountId: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          command: pages deploy dist --project-name=code829-test