name: Deploy to Cloudflare Pages

on:
  push:
    branches: [master]

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"

concurrency:
  group: deploy-cloudflare-pages-${{ github.ref }}
  cancel-in-progress: true

jobs:
  validate:
    name: Validate workspace
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@8e5e7e5ab8b370d6c329ec480221332ada57f0ab # v4.1.7

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10

      - name: Setup Node
        uses: actions/setup-node@60edb5dd545a775178f52524783378180af0d1f8 # v4.0.2
        with:
          node-version: 22
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Security Audit
        run: pnpm audit --audit-level=moderate

  deploy:
    name: Deploy ${{ matrix.app }}
    needs: validate
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          - app: public
            package: "@code829/public"
            dist: apps/public/dist
            project: code829-public
            domain: code829.com
          - app: admin
            package: "@code829/admin"
            dist: apps/admin/dist
            project: code829-admin
            domain: admin.code829.com
          - app: developer
            package: "@code829/developer"
            dist: apps/developer/dist
            project: code829-developer
            domain: developer.code829.com
          - app: staff
            package: "@code829/staff"
            dist: apps/staff/dist
            project: code829-staff
            domain: staff.code829.com
    env:
      VITE_API_URL: ${{ secrets.VITE_API_URL }}
      VITE_APP_NAME: code829
      VITE_DEFAULT_THEME: system
    steps:
      - name: Checkout
        uses: actions/checkout@8e5e7e5ab8b370d6c329ec480221332ada57f0ab # v4.1.7

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10

      - name: Setup Node
        uses: actions/setup-node@60edb5dd545a775178f52524783378180af0d1f8 # v4.0.2
        with:
          node-version: 22
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build ${{ matrix.app }}
        run: pnpm --filter "${{ matrix.package }}" build

      - name: Install Wrangler CLI
        run: npm install --global wrangler@4

      - name: Deploy ${{ matrix.domain }}
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
        run: wrangler pages deploy ${{ matrix.dist }} --project-name=${{ matrix.project }}
