name: Deploy to Cloudflare Workers

on:
  push:
    branches: [master]
  workflow_dispatch:
    inputs:
      apps:
        description: "Comma-separated list of apps to deploy (e.g. public,admin). Leave blank to deploy all."
        required: false
        default: ""

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"

concurrency:
  group: deploy-cloudflare-workers-${{ github.ref }}
  cancel-in-progress: true

jobs:
  changes:
    name: Detect changed apps
    runs-on: ubuntu-latest
    outputs:
      apps: ${{ steps.resolve.outputs.apps }}
    steps:
      - name: Checkout
        uses: actions/checkout@8e5e7e5ab8b370d6c329ec480221332ada57f0ab # v4.1.7

      - name: Detect path changes
        id: filter
        uses: dorny/paths-filter@de90cc6fb38fc0963ad72b210f1f284cd68cea36 # v3.0.2
        with:
          filters: |
            public:
              - 'apps/public/**'
              - 'packages/shared/**'
              - 'tools/cf-worker/**'
              - 'pnpm-lock.yaml'
              - 'pnpm-workspace.yaml'
              - '.github/workflows/deploy.yml'
            admin:
              - 'apps/admin/**'
              - 'packages/shared/**'
              - 'tools/cf-worker/**'
              - 'pnpm-lock.yaml'
              - 'pnpm-workspace.yaml'
              - '.github/workflows/deploy.yml'
            developer:
              - 'apps/developer/**'
              - 'packages/shared/**'
              - 'tools/cf-worker/**'
              - 'pnpm-lock.yaml'
              - 'pnpm-workspace.yaml'
              - '.github/workflows/deploy.yml'
            staff:
              - 'apps/staff/**'
              - 'packages/shared/**'
              - 'tools/cf-worker/**'
              - 'pnpm-lock.yaml'
              - 'pnpm-workspace.yaml'
              - '.github/workflows/deploy.yml'

      - name: Resolve apps to deploy
        id: resolve
        env:
          MANUAL_APPS: ${{ github.event.inputs.apps }}
          CHANGED_APPS: ${{ steps.filter.outputs.changes }}
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ] && [ -n "$MANUAL_APPS" ]; then
            apps=$(echo "$MANUAL_APPS" | tr ',' '\n' | awk 'NF' | jq -R . | jq -sc .)
          else
            apps="$CHANGED_APPS"
          fi
          echo "apps=$apps" >> "$GITHUB_OUTPUT"
          echo "Resolved apps: $apps"

  validate:
    name: Validate workspace
    needs: changes
    if: needs.changes.outputs.apps != '[]' && needs.changes.outputs.apps != ''
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@8e5e7e5ab8b370d6c329ec480221332ada57f0ab # v4.1.7

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10

      - name: Setup Node
        uses: actions/setup-node@60edb5dd545a775178f52524783378180af0d1f8 # v4.0.2
        with:
          node-version: 22
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Security Audit
        run: pnpm audit --audit-level=moderate

  deploy:
    name: Deploy ${{ matrix.app }}
    needs: [changes, validate]
    if: needs.changes.outputs.apps != '[]' && needs.changes.outputs.apps != ''
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        app: ${{ fromJSON(needs.changes.outputs.apps) }}
    env:
      VITE_API_URL: ${{ secrets.VITE_API_URL }}
      VITE_APP_NAME: code829
      VITE_DEFAULT_THEME: system
    steps:
      - name: Checkout
        uses: actions/checkout@8e5e7e5ab8b370d6c329ec480221332ada57f0ab # v4.1.7

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10

      - name: Setup Node
        uses: actions/setup-node@60edb5dd545a775178f52524783378180af0d1f8 # v4.0.2
        with:
          node-version: 22
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build ${{ matrix.app }}
        run: pnpm --filter "@code829/${{ matrix.app }}" build

      - name: Deploy ${{ matrix.app }} to Cloudflare Workers
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
        run: |
          pnpm dlx wrangler@4 deploy \
            --config "apps/${{ matrix.app }}/wrangler.toml" \
            --var "VITE_API_URL:${{ secrets.VITE_API_URL }}"
