name: Deploy to Cloudflare Page
    
    on:
      push:
        branches: [master]
    
    jobs:
      deploy:
        runs-on: ubuntu-latest
        steps:
          - name: Checkout
            uses: actions/checkout@8e5e7e5ab8b370d6c329ec480221332ada57f0ab # v4.1.7
    
          - name: Setup Node
            uses: actions/setup-node@60edb5dd545a775178f52524783378180af0d1f8 # v4.0.2
            with:
              node-version: 22
              cache: npm
    
          - name: Install dependencies
            run: npm ci
    
          - name: Security Audit
            run: npm audit --audit-level=moderate
    
          - name: Type check
            run: npx tsc --noEmit
    
          - name: Build
            run: npm run build
            env:
              VITE_API_URL: ${{ secrets.VITE_API_URL }}
              VITE_APP_NAME: code829
              VITE_DEFAULT_THEME: system
    
          - name: Deploy to Cloudflare Pages
            uses: cloudflare/wrangler-action@a1a26a7931b21e8470a7f34c9c10f845a7690623 # v3.6.0
            with:
              apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
              accountId: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
              projectName: code829
              command: pages deploy apps/public/dist --project-name=code829-main
